# Fly.io deployment config - Models terminal API + bundled SPA.
#
# Production notes:
#   - 512 MB is intentional. The FastAPI app imports pandas/sklearn/yfinance
#     and OOM-killed on Fly's generated 256 MB default.
#   - DISABLE_LIVE_MARKET_DATA keeps the public demo responsive on small
#     machines. Market widgets use labelled deterministic fallback data; set
#     this to false for a private deployment with live data-provider capacity.
#   - CORS_ORIGINS is configured as a Fly secret because it varies by frontend
#     deployment URL.
#
# First-time deploy:
#   fly launch --copy-config --no-deploy --name models-terminal
#   fly secrets set TERMINAL_USER=... TERMINAL_PASSWORD=... AUTH_SECRET=...
#   fly secrets set CORS_ORIGINS=https://your-vercel-app.vercel.app

app = "models-terminal"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  LOG_LEVEL = "INFO"
  PORT = "8000"
  PYTHONUNBUFFERED = "1"
  DISABLE_LIVE_MARKET_DATA = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

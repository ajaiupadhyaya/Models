# Fly.io deployment config — Models terminal (backend + same-origin SPA).
#
# Free-tier setup (as of 2026):
#   - shared-cpu-1x with 256 MB → fits in Fly's free allowance
#   - auto_stop_machines = "stop" → scales to zero when idle (free)
#   - min_machines_running = 0    → no always-on cost
#   - For daily-driver feel, raise min_machines_running to 1 (small monthly cost
#     once you exceed Fly's free quota).
#
# First-time deploy:
#   fly launch --no-deploy --copy-config --name models-terminal
#   fly secrets set TERMINAL_USER=... TERMINAL_PASSWORD=... AUTH_SECRET=... \
#                   DATABASE_URL=postgres://... FRED_API_KEY=... OPENAI_API_KEY=...
#   fly deploy

app = "models-terminal"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"
  LOG_LEVEL = "INFO"
  # CORS_ORIGINS handled via `fly secrets set` for split-host setups.

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1

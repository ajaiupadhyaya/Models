# Render Blueprint — single-service deploy (API + same-origin SPA).
# Free tier compatible: no managed Postgres / Redis attached here.
# Bring your own Supabase / Neon DATABASE_URL via the dashboard.
#
# Required env vars (set in Render dashboard → Environment):
#   TERMINAL_USER, TERMINAL_PASSWORD, AUTH_SECRET, CORS_ORIGINS
# Optional:
#   DATABASE_URL, FRED_API_KEY, ALPHA_VANTAGE_API_KEY, POLYGON_API_KEY,
#   FMP_API_KEY, NEWSAPI_KEY, OPENAI_API_KEY, FINNHUB_API_KEY, SCHEDULER_ENABLED

services:
  - type: web
    name: terminal-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: INFO
      - key: SCHEDULER_ENABLED
        value: "false"
      - key: TERMINAL_USER
        sync: false
      - key: TERMINAL_PASSWORD
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
